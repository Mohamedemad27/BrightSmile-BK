name: Task
description: Create a general task or work item
title: "[TASK] "
labels: ["task"]
body:
  - type: markdown
    attributes:
      value: |
        Create a task to track work that needs to be done.

  - type: textarea
    id: description
    attributes:
      label: Task Description
      description: What needs to be done?
      placeholder: Describe the task clearly
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: How will we know this task is complete?
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2
        - [ ] Criterion 3
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      description: What type of work is this?
      options:
        - Development
        - Testing
        - Documentation
        - DevOps
        - Refactoring
        - Research
        - Other
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How urgent is this task?
      options:
        - Urgent
        - High
        - Medium
        - Low
    validations:
      required: true

  - type: input
    id: estimate
    attributes:
      label: Time Estimate
      description: How long do you estimate this will take?
      placeholder: e.g., 2 hours, 1 day, 1 week
    validations:
      required: false

  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
      description: Does this task depend on anything else?
      placeholder: |
        - Issue #123
        - Waiting for external service setup
        - Needs design approval
    validations:
      required: false

  - type: textarea
    id: technical
    attributes:
      label: Technical Notes
      description: Any technical details or considerations
      placeholder: Implementation notes, gotchas, related code locations
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other relevant information
    validations:
      required: false
