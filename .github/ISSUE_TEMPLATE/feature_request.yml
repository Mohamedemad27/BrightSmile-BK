name: Feature Request
description: Suggest a new feature or enhancement
title: "[FEATURE] "
labels: ["enhancement", "needs-discussion"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a new feature! Please provide as much detail as possible.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve?
      placeholder: I'm always frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work?
      placeholder: Describe your ideal solution
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What alternative solutions have you considered?
      placeholder: Other approaches you've thought about
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this feature?
      options:
        - Critical (blocking work)
        - High (important for near-term)
        - Medium (nice to have soon)
        - Low (future consideration)
    validations:
      required: true

  - type: checkboxes
    id: type
    attributes:
      label: Feature Type
      description: What type of feature is this?
      options:
        - label: Backend API endpoint
        - label: Database/Model changes
        - label: Background task/Celery
        - label: DevOps/Infrastructure
        - label: Testing/Documentation
        - label: Other

  - type: textarea
    id: technical
    attributes:
      label: Technical Details
      description: Any technical considerations or implementation ideas?
      placeholder: Possible technical approach, dependencies, etc.
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context, mockups, or examples
      placeholder: Links, screenshots, examples from other projects
    validations:
      required: false
